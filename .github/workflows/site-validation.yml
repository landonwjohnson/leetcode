name: Site Validation

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  validate-site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    env:
      NEXT_PUBLIC_SITE_ORIGIN: https://landonjohnson.github.io
      NEXT_PUBLIC_REPO_NAME: LeetCodeSwift
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Generate content
        run: npm run generate-content
      - name: Run tests
        run: npm test
      - name: Validate metadata and links
        run: npm run validate-seo
      - name: Build
        run: npm run build

  e2e-render-smoke:
    name: E2E Render Smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    env:
      NEXT_PUBLIC_SITE_ORIGIN: https://landonjohnson.github.io
      NEXT_PUBLIC_REPO_NAME: LeetCodeSwift
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run Playwright smoke tests
        run: npm run test:e2e
