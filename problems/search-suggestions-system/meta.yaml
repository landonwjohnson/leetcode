summary: Build incremental typeahead suggestions as a user types.
whatItAsks: Return up to three lexicographically smallest products for each search prefix.
recognitionClues:
  - You need results for every prefix, not one final query.
  - Results must be ordered and capped.
  - Prefix filtering dominates the workflow.
whyPatternFits: Prefix indexing and sorting keep each keystroke response predictable.
dailyUsefulness: Core mental model for search bars, command palettes, and autocomplete.
interviewUsefulness: Tests prefix data structures, ordering constraints, and incremental queries.
realWorldRelevance: Mirrors product search, docs lookup, and in-app finder experiences.
useCases:
  - Product autocomplete in ecommerce search.
  - Command palette query suggestions.
  - Instant article lookup in docs portals.
demoIdeas:
  - Animate suggestions updating on each keystroke.
  - Compare strict prefix vs fuzzy fallback behavior.
