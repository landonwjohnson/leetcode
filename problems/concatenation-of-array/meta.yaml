summary: Duplicate array content in sequence to create a 2n output.
whatItAsks: Return an array containing the original values followed by the same values again.
recognitionClues:
  - Output length is a direct multiple of input length.
  - Result format is explicit and deterministic.
  - A single pass append loop is sufficient.
whyPatternFits: Direct array duplication keeps implementation predictable and linear.
